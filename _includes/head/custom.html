<link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/assets/images/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="{{ site.baseurl }}/assets/images/apple-touch-icon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  .header__brand a {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
    text-decoration: none;
    color: inherit;
  }
  .header__brand a::before {
    content: "COMPUTER VISION RESEARCH SPACE";
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: #000;
  }
  .header__brand a::after {
    content: "Learning to See";
    font-size: 0.75rem;
    color: #999;
    font-weight: 400;
    margin-top: 2px;
  }
  .header__brand a > * {
    display: none !important;
  }
  .header__brand a {
    font-size: 0 !important;
  }
  .header__brand svg,
  .header__brand > img {
    display: none !important;
  }
  .header__brand a:hover::before {
    color: #e53935 !important;
    transition: color 0.2s;
  }
  .header__brand a::before {
    transition: color 0.2s;
  }
  .page__content {
    margin-left: 2rem !important;
  }
  .article__navigation {
    display: none !important;
  }
</style>
<script>
(function() {
  document.addEventListener('DOMContentLoaded', function() {
    var path = window.location.pathname;
    var base = '/blog';
    var isHomepage = (path === base + '/' || path === base + '/en/' || path === base || path === base + '/en');

    if (!isHomepage) {
      // 포스트 페이지: KR/EN 링크를 현재 페이지 + ?lang 파라미터로 변경
      var navLinks = document.querySelectorAll('.navigation a, header a');
      navLinks.forEach(function(link) {
        var text = link.textContent.trim();
        if (text === 'KR') {
          link.href = path + '?lang=kr';
        } else if (text === 'EN') {
          link.href = path + '?lang=en';
        }
      });

      // ?lang 파라미터에 따라 사이드바 텍스트 교체
      var lang = new URLSearchParams(window.location.search).get('lang');
      var krToEn = {
        '컴퓨터 비전': 'Computer Vision',
        '논문 리뷰': 'Paper Review',
        '선형대수학': 'Linear Algebra',
        '통계학': 'Statistics',
        '미적분학': 'Calculus',
        '전체 방문자': 'Visitors',
        '전체 조회수': 'Views'
      };
      var enToKr = {};
      for (var k in krToEn) enToKr[krToEn[k]] = k;

      if (lang === 'en') {
        document.querySelectorAll('.toc-h1').forEach(function(el) {
          var t = el.textContent.trim();
          if (krToEn[t]) el.textContent = krToEn[t];
        });
        document.querySelectorAll('.sidebar-visitor div[style]').forEach(function(el) {
          var t = el.textContent.trim();
          if (krToEn[t]) el.textContent = krToEn[t];
        });
      } else if (lang === 'kr') {
        document.querySelectorAll('.toc-h1').forEach(function(el) {
          var t = el.textContent.trim();
          if (enToKr[t]) el.textContent = enToKr[t];
        });
        document.querySelectorAll('.sidebar-visitor div[style]').forEach(function(el) {
          var t = el.textContent.trim();
          if (enToKr[t]) el.textContent = enToKr[t];
        });
      }
    }
  });
})();
</script>
